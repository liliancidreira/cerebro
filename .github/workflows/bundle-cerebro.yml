name: Bundle cerebro nos plugins
on:
  push:
    branches: [main]
    paths:
      - 'nucleo/**'
      - 'vendas/**'
      - 'conteudo/**'
      - 'skill-knowledge/**'
permissions:
  contents: write
jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/ci-sync.sh
